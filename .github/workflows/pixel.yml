name: Auto Renew with Playwright

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 0:00（北京时间 8:00）
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Download private script
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: Show files
        run: |
          pwd
          ls -la
          ls -la private

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run renew script
        env:
          PIXELFORGE_EMAIL: ${{ secrets.PIXELFORGE_EMAIL }}
          PIXELFORGE_PASSWORD: ${{ secrets.PIXELFORGE_PASSWORD }}
        run: python private/renew_playwright.py

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: |
            private/server_page.png
            private/error_screenshot.png
